name: Bilal Responder

on:
  schedule:
    - cron: '0 */2 * * *'
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  part-one:
    if: github.event.schedule == '0 */2 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run Part 1
        env:
          RUN_MODE: part1
          LI_AT: ${{ secrets.LI_AT }}
          LI_JSESSIONID: ${{ secrets.LI_JSESSIONID }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          WATCHER_SHEET_URL: ${{ secrets.WATCHER_SHEET_URL }}
          RESPONDER_SHEET_URL: ${{ secrets.RESPONDER_SHEET_URL }}
          MEMORY_URL: ${{ secrets.MEMORY_URL }}
          CONTEXT_URL: ${{ secrets.CONTEXT_URL }}
          CASE_STUDY_URL: ${{ secrets.CASE_STUDY_URL }}
        run: python bilal.py

  part-two:
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run Part 2
        env:
          RUN_MODE: part2
          LI_AT: ${{ secrets.LI_AT }}
          LI_JSESSIONID: ${{ secrets.LI_JSESSIONID }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          WATCHER_SHEET_URL: ${{ secrets.WATCHER_SHEET_URL }}
          RESPONDER_SHEET_URL: ${{ secrets.RESPONDER_SHEET_URL }}
          MEMORY_URL: ${{ secrets.MEMORY_URL }}
          CONTEXT_URL: ${{ secrets.CONTEXT_URL }}
          CASE_STUDY_URL: ${{ secrets.CASE_STUDY_URL }}
        run: python bilal.py
