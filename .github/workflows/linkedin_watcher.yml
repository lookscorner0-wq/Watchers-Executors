name: LinkedIn Watcher
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: linkedin-agent          # 🔐 Shared lock — same group as Replier
  cancel-in-progress: false      # ⏳ Replier waits, does NOT get cancelled

jobs:
  watcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run LinkedIn Watcher
        env:
          LI_AT:         ${{ secrets.LI_AT }}
          LI_JSESSIONID: ${{ secrets.LI_JSESSIONID }}
          OPENAI_KEY:    ${{ secrets.OPENAI_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python linkedin_watcher.py
        
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: debug-screenshots
          path: "*.png"
