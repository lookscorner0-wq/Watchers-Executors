# .github/workflows/linkedin.yml

name: LinkedIn Agents

on:
  schedule:
    - cron: '0 */3 * * *'   # Watcher — every 3 hours
    - cron: '*/30 * * * *'  # Replier — every 30 minutes
  workflow_dispatch:         # Manual run option

jobs:

  # ============================================================
  # WATCHER — Every 3 hours
  # ============================================================
  watcher:
    if: github.event.schedule == '0 */3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run LinkedIn Watcher
        env:
          LI_AT:         ${{ secrets.LI_AT }}
          LI_JSESSIONID: ${{ secrets.LI_JSESSIONID }}
          OPENAI_KEY:    ${{ secrets.OPENAI_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python linkedin_watcher.py

  # ============================================================
  # REPLIER — Every 30 minutes
  # ============================================================
  replier:
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run LinkedIn Replier
        env:
          LI_AT:         ${{ secrets.LI_AT }}
          LI_JSESSIONID: ${{ secrets.LI_JSESSIONID }}
          OPENAI_KEY:    ${{ secrets.OPENAI_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python linkedin_replier.py
